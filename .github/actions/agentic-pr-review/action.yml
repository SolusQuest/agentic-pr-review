name: Agentic PR Review
description: Session-aware agentic pull request review with state artifact restore.

inputs:
  runtime_provider:
    description: 'Runtime to use for review generation: test or claude-code-cli.'
    required: false
    default: test
  target_mode:
    description: 'Review target source: pull-request or synthetic-fixture.'
    required: false
    default: pull-request
  review_mode:
    description: 'State behavior: auto, bootstrap, or incremental.'
    required: false
    default: auto
  pr_number:
    description: Pull request number. Inferred from pull_request events when omitted.
    required: false
  state_key:
    description: Optional deterministic state key. Defaults to the target and runtime.
    required: false
  state_artifact_run_id:
    description: Optional workflow run id to restore the previous state artifact from.
    required: false
  artifact_retention_days:
    description: Retention for state artifacts, clamped to 1 through 7 days.
    required: false
    default: '7'
  post_comment:
    description: Whether to create or update the sticky top-level PR comment.
    required: false
    default: 'false'
  model_base_url:
    description: Anthropic-compatible base URL for claude-code-cli runtime.
    required: false
  model_name:
    description: Primary model for claude-code-cli runtime.
    required: false
  small_model_name:
    description: Optional small/background model for claude-code-cli runtime.
    required: false
  api_key_mode:
    description: How AGENTIC_REVIEW_API_KEY is exposed to the runtime.
    required: false
    default: auth-token
  claude_code_version:
    description: Explicit Claude Code CLI semver to install for live runtime.
    required: false
  tool_mode:
    description: 'Runtime tool access mode: none or readonly.'
    required: false
    default: none
  claude_max_turns:
    description: Maximum Claude Code agent turns for live runtime.
    required: false
    default: '6'
  instructions:
    description: Stable review instructions. Mutually exclusive with instructions_path.
    required: false
  instructions_path:
    description: Path to stable review instructions. Mutually exclusive with instructions.
    required: false
  bootstrap_context:
    description: Context used only for bootstrap / auto-bootstrap.
    required: false
  bootstrap_context_path:
    description: Path to bootstrap context. Mutually exclusive with bootstrap_context.
    required: false
  incremental_context:
    description: Context used only for incremental review.
    required: false
  incremental_context_path:
    description: Path to incremental context. Mutually exclusive with incremental_context.
    required: false
  max_context_chars:
    description: Maximum characters allowed for each instruction/context block.
    required: false
    default: '60000'
  max_patch_chars:
    description: Maximum patch characters included in the review prompt.
    required: false
    default: '120000'
  max_review_chars:
    description: Maximum characters retained in the rendered review markdown.
    required: false
    default: '12000'
  max_findings:
    description: Maximum normalized findings rendered in the sticky comment and structured result artifact.
    required: false
    default: '50'
  inline_comments:
    description: Whether to post eligible structured findings as inline pull request review comments.
    required: false
    default: 'false'
  max_inline_comments:
    description: Maximum inline review comments to post, clamped to 0 through 10.
    required: false
    default: '5'
  inline_min_severity:
    description: 'Minimum severity for inline comments: low, medium, or high.'
    required: false
    default: medium
  inline_min_confidence:
    description: 'Minimum confidence for inline comments: medium or high.'
    required: false
    default: high
  test_runtime_fixture:
    description: Structured fixture emitted by runtime_provider=test, including inline_commentable, inline_non_commentable, and inline_many_findings for inline smoke validation.
    required: false
    default: valid
  max_uncached_input_tokens:
    description: 'Maximum current-run uncached input tokens before failing. 0 disables.'
    required: false
    default: '0'
  max_cached_input_tokens:
    description: 'Maximum current-run cached input tokens before failing. 0 disables.'
    required: false
    default: '0'
  max_output_tokens:
    description: 'Maximum current-run output tokens before failing. 0 disables.'
    required: false
    default: '0'
  disable_prompt_caching:
    description: Whether to set DISABLE_PROMPT_CACHING=1 for claude-code-cli runtime.
    required: false
    default: 'false'
  debug_capture_raw_api_bodies:
    description: Restricted manual diagnostic capture for trusted workflow_dispatch runs.
    required: false
    default: 'false'
  debug_acknowledgement:
    description: Must equal allow-raw-provider-debug for synthetic diagnostics or allow-raw-provider-debug-public-pr for same-repo public PR diagnostics.
    required: false

outputs:
  state_key:
    description: Resolved state key.
  review_mode:
    description: Requested review mode.
  phase:
    description: Actual executed phase, bootstrap or incremental.
  review_phase:
    description: 'Provider execution result: bootstrap, incremental, or skipped-identical.'
  runtime_provider:
    description: Runtime provider used.
  session_id:
    description: Runtime session id.
  reviewed_head_sha:
    description: Reviewed target head SHA when available.
  artifact_name:
    description: Uploaded state artifact name.
  artifact_id:
    description: Uploaded state artifact id when available.
  artifact_url:
    description: Uploaded state artifact URL when available.
  artifact_retention_days:
    description: Effective artifact retention.
  structured_result_path:
    description: Path to the validated structured review result JSON.
  rendered_review_markdown_path:
    description: Path to rendered review markdown generated from structured data.
  structured_output_status:
    description: Structured output validation status.
  findings_input_count:
    description: Number of normalized findings before applying the finding cap.
  findings_post_cap_count:
    description: Number of normalized findings after applying max_findings and before max_review_chars fitting.
  findings_rendered_count:
    description: Number of normalized findings rendered in comments and structured artifacts.
  findings_truncated:
    description: Whether findings were truncated by the finding cap.
  findings_truncation_reason:
    description: Finding truncation reason, when truncated.
  inline_comments_enabled:
    description: Whether inline pull request review comments were enabled.
  inline_comments_candidate_count:
    description: Eligible inline comment candidates before applying max_inline_comments.
  inline_comments_effective_cap:
    description: Effective inline comment cap after input clamping.
  inline_comments_cap_exceeded_count:
    description: Eligible inline candidates omitted by max_inline_comments.
  inline_comments_posted_count:
    description: Inline comments posted by this run.
  inline_comments_duplicate_count:
    description: Inline candidates suppressed by existing duplicate markers.
  inline_comments_skipped_count:
    description: Inline candidates skipped before posting.
  inline_comments_failed_count:
    description: Inline comment posting failures recorded without hiding sticky findings.
  comment_url:
    description: Sticky comment URL when post_comment is enabled.
  lineage_action:
    description: Sticky comment lineage action when post_comment is enabled.
  lineage_reason:
    description: Sticky comment lineage reason when post_comment is enabled.
  debug_artifact_name:
    description: Restricted diagnostic artifact name when debug capture is enabled.
  debug_artifact_id:
    description: Restricted diagnostic artifact id when debug capture is enabled.
  debug_artifact_url:
    description: Restricted diagnostic artifact URL when debug capture is enabled.
  observed_turns:
    description: 'Current-run observed agent turns'
  observed_turn_source:
    description: 'Turn count source: unique_assistant_message_ids, not_applicable, or unavailable'
  lineage_observed_turns:
    description: 'Lineage cumulative observed turns'
  lineage_totals_source:
    description: 'Lineage data source'
  lineage_totals_partial:
    description: 'Whether lineage totals are partial (legacy manifest)'
  lineage_usage_input_tokens:
    description: 'Lineage cumulative input tokens'
  lineage_usage_cache_read_input_tokens:
    description: 'Lineage cumulative cache-read tokens'
  lineage_usage_cache_creation_input_tokens:
    description: 'Lineage cumulative cache-creation tokens'
  lineage_usage_output_tokens:
    description: 'Lineage cumulative output tokens'

runs:
  using: node24
  main: dist/index.js
