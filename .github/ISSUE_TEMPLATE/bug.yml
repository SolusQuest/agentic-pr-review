name: Bug
description: Report broken expected behavior
title: 'Bug: '
type: bug
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What is broken?
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What should happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What happens instead?
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Reproduction Steps
      description: How can this be reproduced?
      value: |
        1.
        2.
        3.
    validations:
      required: false

  - type: textarea
    id: impact
    attributes:
      label: Impact
      description: Who or what is affected?
    validations:
      required: false

  - type: textarea
    id: suspected-area
    attributes:
      label: Suspected Area
      description: Relevant action, runtime, provider, docs, workflow, or code path.
    validations:
      required: false

  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance Criteria
      value: |
        - [ ]
    validations:
      required: true

  - type: textarea
    id: related
    attributes:
      label: Related Docs / Issues / PRs
      description: Link docs, issues, PRs, or code paths.
    validations:
      required: false
