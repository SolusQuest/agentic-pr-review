name: Live Smoke

on:
  workflow_dispatch:
    inputs:
      review_mode:
        description: Review mode for the live synthetic smoke.
        required: true
        default: auto
        type: choice
        options:
          - auto
          - bootstrap
          - incremental
      target_mode:
        description: Diagnostic target mode.
        required: true
        default: synthetic-fixture
        type: choice
        options:
          - synthetic-fixture
          - pull-request
      pr_number:
        description: Same-repo public PR number when target_mode=pull-request.
        required: false
      state_key:
        description: Diagnostic state key. Use distinct values for independent probes.
        required: true
        default: live-synthetic-smoke
      tool_mode:
        description: Runtime tool access mode.
        required: true
        default: none
        type: choice
        options:
          - none
          - readonly
      claude_max_turns:
        description: Maximum Claude Code turns.
        required: true
        default: '6'
      max_uncached_input_tokens:
        description: Maximum observed uncached input tokens before failing. 0 disables.
        required: true
        default: '0'
      max_cached_input_tokens:
        description: Maximum observed cached input tokens before failing. 0 disables.
        required: true
        default: '0'
      max_output_tokens:
        description: Maximum observed output tokens before failing. 0 disables.
        required: true
        default: '0'
      allow_non_default_ref_diagnostic:
        description: Allow trusted maintainer diagnostic dispatch from a non-default ref.
        required: true
        default: false
        type: boolean
      debug_capture_raw_api_bodies:
        description: Enable restricted raw provider diagnostic artifact.
        required: true
        default: false
        type: boolean
      debug_acknowledgement:
        description: Must equal the required diagnostic acknowledgement when raw capture is enabled.
        required: false

permissions:
  contents: read
  actions: read
  pull-requests: read

jobs:
  live-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Validate trusted dispatch ref
        env:
          TRUSTED_REF: refs/heads/${{ github.event.repository.default_branch }}
          ALLOW_NON_DEFAULT_REF_DIAGNOSTIC: ${{ inputs.allow_non_default_ref_diagnostic }}
          DEBUG_CAPTURE_RAW_API_BODIES: ${{ inputs.debug_capture_raw_api_bodies }}
          DEBUG_ACKNOWLEDGEMENT: ${{ inputs.debug_acknowledgement }}
        run: |
          if [ "${GITHUB_REF}" != "${TRUSTED_REF}" ]; then
            if [ "${ALLOW_NON_DEFAULT_REF_DIAGNOSTIC}" = "true" ] && \
               [ "${DEBUG_CAPTURE_RAW_API_BODIES}" = "true" ] && \
               { [ "${DEBUG_ACKNOWLEDGEMENT}" = "allow-raw-provider-debug" ] || \
                 [ "${DEBUG_ACKNOWLEDGEMENT}" = "allow-raw-provider-debug-public-pr" ]; }; then
              echo "::warning::Trusted diagnostic dispatch allowed from ${GITHUB_REF}; default branch is ${TRUSTED_REF}"
              exit 0
            fi
            echo "::error::Live smoke may only run from ${TRUSTED_REF}; got ${GITHUB_REF}"
            exit 1
          fi
      - uses: ./.github/actions/agentic-pr-review
        with:
          runtime_provider: claude-code-cli
          target_mode: ${{ inputs.target_mode }}
          pr_number: ${{ inputs.pr_number }}
          review_mode: ${{ inputs.review_mode }}
          state_key: ${{ inputs.state_key }}
          post_comment: 'false'
          model_base_url: ${{ vars.AGENTIC_REVIEW_CLAUDE_CODE_BASE_URL }}
          model_name: ${{ vars.AGENTIC_REVIEW_CLAUDE_CODE_MODEL }}
          small_model_name: ${{ vars.AGENTIC_REVIEW_CLAUDE_CODE_SMALL_MODEL }}
          api_key_mode: ${{ vars.AGENTIC_REVIEW_CLAUDE_CODE_API_KEY_MODE || 'auth-token' }}
          claude_code_version: ${{ vars.AGENTIC_REVIEW_CLAUDE_CODE_VERSION }}
          tool_mode: ${{ inputs.tool_mode }}
          claude_max_turns: ${{ inputs.claude_max_turns }}
          max_uncached_input_tokens: ${{ inputs.max_uncached_input_tokens }}
          max_cached_input_tokens: ${{ inputs.max_cached_input_tokens }}
          max_output_tokens: ${{ inputs.max_output_tokens }}
          disable_prompt_caching: 'false'
          instructions: 'Review this synthetic fixture and return a concise public-safe smoke result.'
          debug_capture_raw_api_bodies: ${{ inputs.debug_capture_raw_api_bodies }}
          debug_acknowledgement: ${{ inputs.debug_acknowledgement }}
        env:
          GITHUB_TOKEN: ${{ github.token }}
          AGENTIC_REVIEW_API_KEY: ${{ secrets.AGENTIC_REVIEW_CLAUDE_CODE_API_KEY }}
