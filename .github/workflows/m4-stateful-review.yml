name: Agentic PR Review M4 Stateful Review

on:
  workflow_run:
    workflows: [Agentic PR Review M4 Untrusted Analysis]
    types: [completed]

permissions:
  contents: write
  pull-requests: write
  actions: read

jobs:
  review:
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      vars.AGENTIC_REVIEW_M4_STATEFUL_ENABLED == 'true' &&
      github.event.workflow_run.pull_requests[0].number != ''
    runs-on: ubuntu-latest
    concurrency:
      group: apr-m4-v1-${{ github.repository_id }}-${{ github.event.workflow_run.pull_requests[0].number }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
      - run: npm ci
      - name: Build trusted runtime outside the checkout
        run: >-
          dotnet build runtime/AgenticPrReview.Runtime/AgenticPrReview.Runtime.csproj
          --configuration Release --output "$RUNNER_TEMP/agentic-pr-review-runtime"
      - name: Configure trusted runtime command
        shell: bash
        run: |
          printf 'AGENTIC_REVIEW_RUNTIME_EXECUTABLE=%s\n' "$(realpath "$(command -v dotnet)")" >> "$GITHUB_ENV"
          printf 'AGENTIC_REVIEW_RUNTIME_PREFIX_ARGS_JSON=["%s"]\n' "$RUNNER_TEMP/agentic-pr-review-runtime/AgenticPrReview.Runtime.dll" >> "$GITHUB_ENV"
      - uses: ./.github/actions/agentic-pr-review
        with:
          runtime_backend: ledger-csharp
          runtime_provider: test
          target_mode: pull-request
          review_mode: auto
          post_comment: 'true'
          inline_comments: 'false'
